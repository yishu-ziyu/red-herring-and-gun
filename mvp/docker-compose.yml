version: "3.8"

services:
  red-herring-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: red-herring-api
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
